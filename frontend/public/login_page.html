
<div style="background: var(--color-background-tertiary); min-height: 520px; display: flex; align-items: center; justify-content: center; padding: 2rem; border-radius: var(--border-radius-lg);">
  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2.5rem; width: 100%; max-width: 380px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
      <div style="width: 32px; height: 32px; background: #534AB7; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-stack-2" style="font-size: 18px; color: #EEEDFE;" aria-hidden="true"></i>
      </div>
      <span style="font-weight: 500; font-size: 16px; color: var(--color-text-primary);">Taskflow</span>
    </div>
    <h2 style="font-size: 20px; font-weight: 500; margin: 0 0 0.4rem; color: var(--color-text-primary);">Welcome back</h2>
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.75rem;">Sign in to your workspace</p>

    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px;">Email address</label>
      <div style="background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 12px; height: 38px; display: flex; align-items: center; gap: 8px;">
        <i class="ti ti-mail" style="font-size: 15px; color: var(--color-text-tertiary);" aria-hidden="true"></i>
        <span style="font-size: 13px; color: var(--color-text-tertiary);">alex@company.com</span>
      </div>
    </div>
    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px;">Password</label>
      <div style="background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 12px; height: 38px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <i class="ti ti-lock" style="font-size: 15px; color: var(--color-text-tertiary);" aria-hidden="true"></i>
          <span style="font-size: 13px; color: var(--color-text-tertiary);">••••••••••</span>
        </div>
        <i class="ti ti-eye-off" style="font-size: 15px; color: var(--color-text-tertiary);" aria-hidden="true"></i>
      </div>
    </div>
    <div style="background: #534AB7; border-radius: var(--border-radius-md); height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
      <span style="font-size: 14px; font-weight: 500; color: #EEEDFE;">Sign in</span>
    </div>
    <p style="font-size: 12px; color: var(--color-text-secondary); text-align: center; margin: 0;">Don't have an account? <span style="color: #534AB7; font-weight: 500;">Create workspace</span></p>
  </div>
</div>
